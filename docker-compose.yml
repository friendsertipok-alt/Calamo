
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calamo_backend
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - redis
      - db
    expose:
      - "8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/calamo.db:/app/calamo.db
      - ./backend/admin_emails.json:/app/admin_emails.json
      - ./backend/uploads:/app/uploads
      - ./backend/output:/app/output
      - ./backend/logs:/app/logs
      - ./frontend:/app/frontend:ro
    env_file:
      - ./backend/.env
    secrets:
      - gemini_api_key
      - proxyapi_key
      - postgres_password
    networks:
      - calamo_network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calamo_worker
    restart: always
    command: arq app.worker.WorkerSettings
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./backend/app:/app/app
      - ./backend/calamo.db:/app/calamo.db
      - ./backend/admin_emails.json:/app/admin_emails.json
      - ./backend/uploads:/app/uploads
      - ./backend/output:/app/output
      - ./backend/logs:/app/logs
      - ./frontend:/app/frontend:ro
    env_file:
      - ./backend/.env
    secrets:
      - gemini_api_key
      - proxyapi_key
      - postgres_password
    depends_on:
      - redis
      - db
    networks:
      - calamo_internal
      - calamo_network

  db:
    image: postgres:15-alpine
    container_name: calamo_db
    restart: always
    command: 
      - "postgres"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=384MB"
      - "-c"
      - "work_mem=4MB"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - calamo_network

  redis:
    image: redis:alpine
    container_name: calamo_redis
    restart: always
    networks:
      - calamo_network

  nginx:
    image: nginx:alpine
    container_name: calamo_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - calamo_network

networks:
  calamo_network:
  calamo_internal:
    internal: true

volumes:
  postgres_data:

secrets:
  gemini_api_key:
    file: ./backend/secrets/gemini_api_key.txt
  proxyapi_key:
    file: ./backend/secrets/proxyapi_key.txt
  postgres_password:
    file: ./backend/secrets/postgres_password.txt
