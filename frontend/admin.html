<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calamo — Админ-панель</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #000000; --surface: #0a0a0a; --surface2: #111111;
            --border: #3f3f46; --text: #fafaf9; --muted: #a8a29e;
            --accent: #ff4d00; --accent2: #ff6a26;
            --green: #00e676; --red: #ff4b4b; --blue: #2979ff; --yellow: #ffc107;
        }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        /* Auth Gate */
        #auth-gate { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .auth-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:48px; text-align:center; max-width:400px; }
        .auth-box h1 { font-size:24px; margin-bottom:8px; }
        .auth-box p { color:var(--muted); margin-bottom:24px; font-size:14px; }
        .auth-box .btn { background:var(--accent); color:#fff; border:none; padding:12px 32px; border-radius:10px; font-size:15px; cursor:pointer; font-weight:600; transition:.2s; }
        .auth-box .btn:hover { background:var(--accent2); transform:translateY(-1px); }
        .auth-box .error { color:var(--red); margin-top:16px; font-size:13px; display:none; }

        /* Layout */
        #admin-app { display:none; }
        .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
        .topbar h1 { font-size:18px; font-weight:700; }
        .topbar h1 span { color:var(--accent); }
        .topbar-right { display:flex; align-items:center; gap:16px; }
        .topbar-nav { display:flex; gap: 10px; margin-left: 30px; }
        .nav-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .nav-btn:hover { background: rgba(255,123,0,0.1); color: var(--accent); }
        .nav-btn.active { background: rgba(255,123,0,0.15); border-color: var(--accent); color: var(--accent); }
        .topbar-right .email { color:var(--muted); font-size:13px; }
        .topbar-right .btn-sm { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 14px; border-radius:8px; font-size:12px; cursor:pointer; transition:.2s; }
        .topbar-right .btn-sm:hover { border-color:var(--accent); }

        .container { max-width:1200px; margin:0 auto; padding:24px 32px; }

        /* Metric Cards */
        .metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-bottom:24px; }
        .metric-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px 24px; transition: 0.3s; }
        .metric-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .metric-card .label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; font-weight: 600; }
        .metric-card .value { font-size:28px; font-weight:700; }
        .metric-card .sub { font-size:12px; color:var(--muted); margin-top:4px; }
        .metric-card.accent .value { color:var(--accent); }
        .metric-card.green .value { color:var(--green); }
        .metric-card.blue .value { color:var(--blue); }
        .metric-card.red .value { color:var(--red); }

        /* Funnel */
        .section-title { font-size:16px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .section-title span { color:var(--accent); }
        .funnel-container { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:32px; }
        .funnel-steps { display:flex; align-items:center; gap:0; justify-content:center; flex-wrap:wrap; }
        .funnel-step { text-align:center; flex:1; min-width:120px; padding:16px 8px; position:relative; }
        .funnel-step .num { font-size:32px; font-weight:700; color:var(--accent); }
        .funnel-step .name { font-size:12px; color:var(--muted); margin-top:4px; }
        .funnel-step .pct { font-size:11px; color:var(--green); margin-top:2px; }
        .funnel-arrow { color:var(--border); font-size:24px; padding:0 4px; }

        /* Orders Table */
        .table-container { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:32px; }
        .table-header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
        .table-header h3 { font-size:15px; font-weight:600; }
        table { width:100%; border-collapse:collapse; }
        th { text-align:left; padding:10px 16px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
        td { padding:12px 16px; font-size:13px; border-bottom:1px solid rgba(63,63,70,.3); }
        tr:hover { background:rgba(249,115,22,.03); }
        .status-badge { padding:3px 10px; border-radius:6px; font-size:11px; font-weight:600; display:inline-block; }
        .status-completed { background:rgba(34,197,94,.15); color:var(--green); }
        .status-failed { background:rgba(239,68,68,.15); color:var(--red); }
        .status-pending { background:rgba(168,162,158,.15); color:var(--muted); }
        .status-progress { background:rgba(59,130,246,.15); color:var(--blue); }
        .status-draft { background:rgba(234,179,8,.15); color:var(--yellow); }
        a.dl-link { color:var(--accent); text-decoration:none; font-weight:500; }
        a.dl-link:hover { text-decoration:underline; }

        /* LLM Stats */
        .llm-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; margin-bottom:24px; }
        .llm-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px 24px; position: relative; }
        .llm-card .icon { font-size:20px; margin-bottom:8px; }
        .llm-card .val { font-size:22px; font-weight:700; margin-bottom:2px; }
        .llm-card .lbl { font-size:12px; color:var(--muted); }

        .loading { text-align:center; padding:60px; color:var(--muted); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .loading span { animation:pulse 1.5s infinite; }
        
        .terminal-line.error { color:#ef4444; }

        /* PREMIUM BUTTONS & INPUTS */
        .btn-premium {
            background: rgba(255,123,0,0.1);
            border: 1px solid rgba(255,123,0,0.2);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-premium:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }
        .btn-premium.red {
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.2);
            color: var(--red);
        }
        .btn-premium.red:hover {
            background: var(--red);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        .btn-premium.green {
            background: rgba(34,197,94,0.1);
            border-color: rgba(34,197,94,0.2);
            color: var(--green);
        }
        .btn-premium.green:hover {
            background: var(--green);
            color: white;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .admin-input {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            font-size: 13px;
            outline: none;
            transition: 0.3s;
        }
        .admin-input:focus {
            border-color: var(--accent);
            background: rgba(255,123,0,0.05);
            box-shadow: 0 0 0 2px rgba(249,115,22,0.1);
        }
    </style>
</head>
<body>

<!-- Auth Gate -->
<div id="auth-gate">
    <div class="auth-box">
        <div style="margin-bottom: 20px; color: var(--accent);">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        <h1>Админ-панель</h1>
        <p>Войдите через Google, чтобы получить доступ.</p>
        <button class="btn" onclick="loginGoogle()">Войти через Google</button>
        <div id="auth-error" class="error"></div>
    </div>
</div>

<!-- Admin App -->
<div id="admin-app">
    <div class="topbar">
        <div style="display:flex; align-items:center; gap:30px;">
            <h1 style="display: flex; align-items: center; gap: 10px; font-size: 20px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#ff7b00"/>
                    <path d="M2 17L12 22L22 17M2 12L12 17L22 12" stroke="#ff7b00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Calamo <span style="color: var(--accent); font-weight: 500; font-size: 14px; margin-left: -4px; opacity: 0.8;">Admin</span>
            </h1>
            <div class="topbar-nav">
                <button class="btn-sm nav-btn active" id="tab-dashboard" onclick="switchTab('dashboard')" style="display: flex; align-items: center; gap: 6px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Дашборд
                </button>
                <button class="btn-sm nav-btn" id="tab-queue" onclick="switchTab('queue')" style="display: flex; align-items: center; gap: 6px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    Очередь
                </button>
                <button class="btn-sm nav-btn" id="tab-students" onclick="switchTab('students')" style="display: flex; align-items: center; gap: 6px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Студенты
                </button>
                <button class="btn-sm nav-btn" id="tab-tickets" onclick="switchTab('tickets')" style="display: flex; align-items: center; gap: 6px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    Тикеты
                </button>
                <button class="btn-sm nav-btn" id="tab-reviews" onclick="switchTab('reviews')" style="display: flex; align-items: center; gap: 6px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    Отзывы
                </button>
                <button class="btn-sm nav-btn" id="tab-allorders" onclick="switchTab('allorders')" style="display: flex; align-items: center; gap: 6px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                    Все заказы
                </button>
            </div>
        </div>
        <div class="topbar-right">
            <span class="email" id="admin-email"></span>
            <button class="btn-sm" onclick="location.href='/'">← На сайт</button>
            <button class="btn-sm" onclick="logout()">Выйти</button>
        </div>
    </div>
    <div class="container" id="main-content">
        <div class="loading"><span>Загрузка данных...</span></div>
    </div>

    <!-- User Details Modal -->
    <div id="user-modal" class="modal-overlay" style="display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 10000;">
        <div class="glass-card" style="width: 100%; max-width: 800px; background: #1a1412; padding: 30px; border-radius: 16px; border: 1px solid rgba(255,123,0,0.2); max-height: 90vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2 id="modal-user-name">Загрузка...</h2>
                <button style="background:none; border:none; color:var(--muted); cursor:pointer; font-size: 24px;" onclick="closeUserModal()">✕</button>
            </div>
            <div id="modal-user-content">
                <div class="loading"><span>Загрузка данных...</span></div>
            </div>
        </div>
    </div>
</div>

<script>
// Глобальные константы
const API = '/api'; // Базовый путь для API
const TOKEN = ''; // Больше не используется для Auth, оставлено для совместимости

// Функция для получения куки по имени
function getCookie(name) {
    let matches = document.cookie.match(new RegExp(
        "(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"
    ));
    return matches ? decodeURIComponent(matches[1]) : undefined;
}

// Универсальная функция для запросов с поддержкой кук
async function adminFetch(url, options = {}) {
    if (!options.headers) options.headers = {};
    options.headers['X-Requested-With'] = 'XMLHttpRequest'; // ЗАЩИТА CSRF
    options.credentials = 'include'; // КРИТИЧНО для HTTPS и кук
    return fetch(url, options);
}

// === Auth ===
async function checkAdmin() {
    const isLoggedIn = getCookie('logged_in_status') === 'true';
    if (!isLoggedIn) { showAuthGate(); return; }
    
    try {
        const res = await adminFetch(`${API}/admin/check`);
        if (!res.ok) throw new Error('Not admin');
        const data = await res.json();
        document.getElementById('admin-email').textContent = data.email;
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('admin-app').style.display = 'block';
        loadDashboard();
    } catch (e) {
        showAuthGate('У вас нет прав администратора или сессия истёкла.');
    }
}

function showAuthGate(msg) {
    document.getElementById('auth-gate').style.display = 'flex';
    document.getElementById('admin-app').style.display = 'none';
    if (msg) { const el = document.getElementById('auth-error'); el.textContent = msg; el.style.display = 'block'; }
}

async function loginGoogle() {
    try {
        const res = await adminFetch(`${API}/auth/google/url?return_to=/manage-calamo-system`);
        const data = await res.json();
        window.location.href = data.url;
    } catch (e) { alert('Ошибка при получении URL для входа'); }
}

async function logout() { 
    await fetch(`${API}/auth/logout`, { method: 'POST', credentials: 'include' });
    location.href = '/'; 
}

// Больше не используем фрагмент #token=, так как всё на куках

// === Tabs ===
let queueInterval = null;

function switchTab(tab) {
    if (queueInterval) clearInterval(queueInterval);
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    
    if (tab === 'dashboard') loadDashboard();
    else if (tab === 'students') loadStudents();
    else if (tab === 'queue') loadQueue();
    else if (tab === 'tickets') loadTickets();
    else if (tab === 'reviews') loadReviews();
    else if (tab === 'allorders') loadAllOrders();
}

// === Dashboard ===
async function loadDashboard() {
    try {
        const res = await adminFetch(`${API}/admin/dashboard`);
        if (!res.ok) throw new Error('Failed');
        const d = await res.json();
        renderDashboard(d);
    } catch (e) {
        document.getElementById('main-content').innerHTML = `<div class="loading" style="color:var(--red)">Ошибка загрузки: ${e.message}</div>`;
    }
}

function renderDashboard(d) {
    const f = d.funnel;
    const l = d.llm;
    const pctDraft = f.total_orders ? Math.round(f.drafts_created / f.total_orders * 100) : 0;
    const pctConfirm = f.drafts_created ? Math.round(f.drafts_confirmed / f.drafts_created * 100) : 0;
    const pctComplete = f.drafts_confirmed ? Math.round(f.completed / f.drafts_confirmed * 100) : 0;

    let ordersHTML = d.recent_orders.map(o => {
        const stBadge = `<span class="status-badge status-${o.status.toLowerCase()}">${o.status}</span>`;
        let rescueBtn = o.status === 'failed' ? `
            <button class="btn-sm" style="margin-top:4px; padding:2px 8px; font-size:10px; display: flex; align-items: center; gap: 4px; border:1px solid var(--red); background:rgba(239, 68, 68, 0.1); color:var(--red);" onclick="rescueOrder('${o.id}')">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                Спасти
            </button>
        ` : '';
        
        const s_low = o.status.toLowerCase();
        if (['generating_text', 'generating_outline', 'generating_sources', 'generating_charts', 'building_docx', 'pending'].includes(s_low)) {
            rescueBtn += `<div style="display:flex; gap:4px; margin-top:4px;">`;
            rescueBtn += `<button class="btn-sm" style="padding:2px 6px; font-size:9px; background:rgba(234, 179, 8, 0.1); color:var(--yellow); border:1px solid var(--yellow);" onclick="pauseOrder('${o.id}')" title="Поставить на паузу">⏸ Пауза</button>`;
            rescueBtn += `<button class="btn-sm" style="padding:2px 6px; font-size:9px; background:rgba(239, 68, 68, 0.1); color:var(--red); border:1px solid var(--red);" onclick="cancelOrder('${o.id}')" title="Отменить полностью">⏹ Стоп</button>`;
            rescueBtn += `</div>`;
        } else if (s_low === 'paused') {
            rescueBtn += `<div style="display:flex; gap:4px; margin-top:4px;">`;
            rescueBtn += `<button class="btn-sm" style="padding:2px 6px; font-size:9px; background:rgba(34, 197, 94, 0.1); color:var(--green); border:1px solid var(--green);" onclick="resumeOrder('${o.id}')" title="Возобновить генерацию">▶ Продолжить</button>`;
            rescueBtn += `<button class="btn-sm" style="padding:2px 6px; font-size:9px; background:rgba(239, 68, 68, 0.1); color:var(--red); border:1px solid var(--red);" onclick="cancelOrder('${o.id}')" title="Отменить полностью">⏹ Стоп</button>`;
            rescueBtn += `</div>`;
        }
        const dlLink = o.download_url ? `<a class="download-link" href="${o.download_url}" target="_blank" style="display: flex; align-items: center; gap: 4px;">DOCX</a>` : '<span style="color:var(--muted)">—</span>';
        
        return `
            <tr>
                <td style="font-weight:600;color:var(--accent)">${o.id}</td>
                <td>${truncate(o.topic, 40)}</td>
                <td>${o.work_type}</td>
                <td style="font-weight:600;color:var(--green)">${o.cost_rub ? o.cost_rub.toFixed(2) + ' ₽' : '0 ₽'}</td>
                <td>
                    ${stBadge}
                    ${rescueBtn}
                </td>
                <td>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${o.progress}%"></div></div>
                    <div style="font-size:10px; color:var(--muted); margin-top:4px; text-align:center">${o.progress}%</div>
                </td>
                <td>${dlLink}</td>
            </tr>`;
    }).join('');

    document.getElementById('main-content').innerHTML = `
        <!-- Metrics -->
        <div class="metrics">
            <div class="metric-card accent"><div class="label">Всего заказов</div><div class="value">${f.total_orders}</div><div class="sub">за всё время</div></div>
            <div class="metric-card green"><div class="label">Завершено</div><div class="value">${f.completed}</div><div class="sub">успешных генераций</div></div>
            <div class="metric-card blue"><div class="label">Пользователей</div><div class="value">${d.total_users}</div><div class="sub">+${d.new_users_today} сегодня / +${d.new_users_week} за неделю</div></div>
            <div class="metric-card red"><div class="label">Открытые тикеты</div><div class="value">${d.open_tickets}</div><div class="sub">ожидают ответа</div></div>
        </div>

        <div class="metrics" style="margin-top: 20px;">
            <div class="metric-card" style="background: rgba(255,123,0,0.1); border-color: rgba(255,123,0,0.3);"><div class="label">Все визиты авторизованных</div><div class="value" style="color:var(--accent)">${d.total_logins_today}</div><div class="sub">сегодня</div></div>

function statusBadge(s) {
    const map = {
        completed: ['Готов', 'status-completed'], failed: ['Ошибка', 'status-failed'],
        pending: ['Ожидание', 'status-pending'], draft_ready: ['Черновик', 'status-draft'],
        generating_text: ['Генерация', 'status-progress'], generating_outline: ['План', 'status-progress'],
        generating_sources: ['Источники', 'status-progress'], generating_charts: ['Графики', 'status-progress'],
        generating_charts: ['Графики', 'status-progress'],
        building_docx: ['Сборка', 'status-progress'],
        paused: ['Пауза', 'status-pending'],
        cancelled: ['Отменен', 'status-failed'],
    };
    const [label, cls] = map[s] || [s, 'status-pending'];
    
    // Premium Dashboard Styles
    const dotColor = s === 'completed' ? 'var(--green)' : s === 'failed' ? 'var(--red)' : s === 'draft_ready' ? 'var(--yellow)' : 'var(--blue)';
    return `<span class="status-badge ${cls}" style="display: inline-flex; align-items: center; gap: 6px;">
        <span style="width: 6px; height: 6px; border-radius: 50%; background: ${dotColor}; box-shadow: 0 0 8px ${dotColor};"></span>
        ${label}
    </span>`;
}

        if (!res.ok) throw new Error('Failed');
        const users = await res.json();
        
        let rows = '';
        for (const u of users) {
            const date = u.created_at ? new Date(u.created_at).toLocaleDateString('ru-RU') : '—';
            rows += `<tr>
                <td style="color:var(--muted)">${u.id}</td>
                <td style="font-weight:500;">${u.email}</td>
                <td>${u.full_name || '—'}</td>
                <td>${date}</td>
                <td style="color:var(--blue); font-weight:600;">${u.generations_count}</td>
                <td style="color:var(--green); font-weight:600;">${u.balance} ₽</td>

async function updateUserBalance(userId) {
    const input = document.getElementById('update-balance-input');
    const amount = parseFloat(input.value);
    if (isNaN(amount)) return alert('Введите корректное число');
    
    if (!confirm(`Изменить баланс пользователя на ${amount} ₽?`)) return;
    
    try {
        const res = await adminFetch(`${API}/admin/users/${userId}/balance`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ amount: amount })
        });
        
        if (!res.ok) {
            const errorData = await res.json().catch(() => ({}));
            const detail = errorData.detail || 'Неизвестная ошибка сервера';
            throw new Error(`Ошибка ${res.status}: ${JSON.stringify(detail)}`);
        }
        
        alert('Баланс успешно обновлен');
        viewUserDetails(userId); // Обновляем модалку
        if (document.getElementById('tab-students').classList.contains('active')) {
            loadStudents(); // Обновляем список на фоне
        }
    } catch (e) {
        alert(e.message);
    }
}

async function updateLogs(orderId) {
    const el = document.getElementById(`logs-${orderId}`);
    if (!el) return;
    try {
        const res = await adminFetch(`${API}/admin/orders/${orderId}/logs`);
        if (!res.ok) return;
        const data = await res.json();
        
        if (data.logs && data.logs.length > 0) {
            let html = '';
            data.logs.forEach(line => {
                const isError = line.includes('ОШИБКА') || line.includes('failed');
                const parts = line.match(/^\[(.*?)\] (.*)$/);
                if (parts) {
                    html += `<div class="terminal-line ${isError ? 'error' : ''}"><span class="ts">${parts[1]}</span>${parts[2]}</div>`;
                } else {
                    html += `<div class="terminal-line ${isError ? 'error' : ''}">${line}</div>`;
                }
            });
            el.innerHTML = html;
            el.scrollTop = el.scrollHeight;
        } else {
            el.innerHTML = '<div style="color:#555">Ожидание первых записей...</div>';
        }
    } catch (e) {
        console.error("Log fetch error", e);
    }
}

}

    try {
        const res = await adminFetch(`${API}/admin/settings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ llm_strategy: s })
        });
        if (!res.ok) throw new Error('Ошибка сохранения');
        loadDashboard();
    } catch (e) { alert(e.message); }
}

async function setChartEngine(e) {
    try {
        const res = await adminFetch(`${API}/admin/settings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chart_engine: e })
        });
        if (!res.ok) throw new Error('Ошибка сохранения');
        loadDashboard();
    } catch (err) { alert(err.message); }
}

async function rescueOrder(id) {
    if (!confirm(`Попробовать спасти заказ ${id}?`)) return;
    try {
        const res = await adminFetch(`${API}/admin/orders/${id}/rescue`, {
            method: 'POST'
        });
        if (!res.ok) throw new Error('Ошибка спасения');
        const data = await res.json();
        alert(data.message);
        loadDashboard();
    } catch (e) { alert(e.message); }
}

async function setOrderStatus(id, st) {
    const stNames = { paused: 'паузу', stopped: 'полную остановку', pending: 'возобновление' };
    if (!confirm(`Подтвердить ${stNames[st] || st} для заказа ${id}?`)) return;
    try {
        const res = await adminFetch(`${API}/admin/orders/${id}/status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: st })
        });
        if (!res.ok) throw new Error('Ошибка изменения статуса');
        const data = await res.json();
        loadDashboard();
        const tabAll = document.getElementById('tab-allorders');
        if (tabAll && tabAll.classList.contains('active')) {
            loadAllOrders();
        }
    } catch (e) { alert(e.message); }
}

async function pauseOrder(id) {
    try {
        const res = await adminFetch(`${API}/admin/orders/${id}/pause`, { method: 'POST' });
        if (!res.ok) throw new Error('Ошибка');
        loadDashboard();
        const tabAll = document.getElementById('tab-allorders');
        if (tabAll && tabAll.classList.contains('active')) loadAllOrders();
    } catch (e) { alert('Не удалось поставить на паузу'); }
}

async function resumeOrder(id) {
    try {
        const res = await adminFetch(`${API}/admin/orders/${id}/resume`, { method: 'POST' });
        if (!res.ok) throw new Error('Ошибка');
        loadDashboard();
        const tabAll = document.getElementById('tab-allorders');
        if (tabAll && tabAll.classList.contains('active')) loadAllOrders();
    } catch (e) { alert('Не удалось продолжить'); }
}

async function cancelOrder(id) {
    if (!confirm('Точно отменить генерацию?')) return;
    try {
        const res = await adminFetch(`${API}/admin/orders/${id}/cancel`, { method: 'POST' });
        if (!res.ok) throw new Error('Ошибка');
        loadDashboard();
        const tabAll = document.getElementById('tab-allorders');
        if (tabAll && tabAll.classList.contains('active')) loadAllOrders();
    } catch (e) { alert('Не удалось отменить'); }
}

// === All Orders ===
async function loadAllOrders() {
    const mc = document.getElementById('main-content');
    mc.innerHTML = '<div class="loading"><span>Загрузка всех заказов...</span></div>';
    try {
        const res = await adminFetch(`${API}/admin/orders/all`);
        if (!res.ok) throw new Error('Failed');
        const orders = await res.json();
        renderAllOrders(orders);
    } catch (e) {
        mc.innerHTML = `<div class="loading" style="color:var(--red)">Ошибка: ${e.message}</div>`;
    }
}

function renderAllOrders(orders) {
    const statusMap = {
        'completed': { cls: 'status-completed', label: 'Готов' },
        'failed': { cls: 'status-failed', label: 'Ошибка' },
        'pending': { cls: 'status-pending', label: 'Ожидает' },
        'pending_payment': { cls: 'status-pending', label: 'Оплата' },
        'draft_ready': { cls: 'status-pending', label: 'Черновик' },
    };

    const rows = orders.map(o => {
        const st = statusMap[o.status] || { cls: 'status-progress', label: o.status };
        const stBadge = `<span class="status-badge ${st.cls}">${st.label}</span>`;
        
        let rescueBtn = o.status === 'failed' ? `
            <button class="btn-sm" style="margin-top:4px; padding:2px 8px; font-size:10px; display:flex; align-items:center; gap:4px; border:1px solid var(--red); background:rgba(239,68,68,0.1); color:var(--red);" onclick="rescueOrder('${o.id}')">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                Спасти
            </button>` : '';
            
        const s_low = o.status.toLowerCase();
        if (['generating_text', 'generating_outline', 'generating_sources', 'generating_charts', 'building_docx', 'pending'].includes(s_low)) {
            rescueBtn += `<div style="display:flex; gap:4px; margin-top:4px;">`;
            rescueBtn += `<button class="btn-sm" style="padding:2px 6px; font-size:9px; background:rgba(234, 179, 8, 0.1); color:var(--yellow); border:1px solid var(--yellow);" onclick="pauseOrder('${o.id}')" title="Поставить на паузу">⏸ Пауза</button>`;
            rescueBtn += `<button class="btn-sm" style="padding:2px 6px; font-size:9px; background:rgba(239, 68, 68, 0.1); color:var(--red); border:1px solid var(--red);" onclick="cancelOrder('${o.id}')" title="Отменить полностью">⏹ Стоп</button>`;
            rescueBtn += `</div>`;
        } else if (s_low === 'paused') {
            rescueBtn += `<div style="display:flex; gap:4px; margin-top:4px;">`;
            rescueBtn += `<button class="btn-sm" style="padding:2px 6px; font-size:9px; background:rgba(34, 197, 94, 0.1); color:var(--green); border:1px solid var(--green);" onclick="resumeOrder('${o.id}')" title="Возобновить генерацию">▶ Продолжить</button>`;
            rescueBtn += `<button class="btn-sm" style="padding:2px 6px; font-size:9px; background:rgba(239, 68, 68, 0.1); color:var(--red); border:1px solid var(--red);" onclick="cancelOrder('${o.id}')" title="Отменить полностью">⏹ Стоп</button>`;
            rescueBtn += `</div>`;
        }
        const dlLink = o.download_url 
            ? `<a href="${o.download_url}" target="_blank" style="color:var(--green); text-decoration:none; font-weight:600;">DOCX</a>` 
            : '<span style="color:var(--muted)">—</span>';

        const errorHtml = o.error_message 
            ? `<div style="font-size:10px; color:var(--red); margin-top:4px; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${o.error_message.replace(/"/g, '&quot;')}">${o.error_message}</div>` 
            : '';

        const userEmail = o.user_email || '—';
        const emailShort = userEmail.length > 20 ? userEmail.substring(0, 18) + '...' : userEmail;

        return `<tr>
            <td style="font-weight:600; color:var(--accent)">${o.id}</td>
            <td title="${userEmail}" style="font-size:12px; color:var(--muted)">${emailShort}</td>
            <td>${truncate(o.topic, 35)}</td>
            <td>${o.work_type}</td>
            <td style="font-weight:600; color:var(--green)">${o.cost_rub ? o.cost_rub.toFixed(2) + ' ₽' : '0 ₽'}</td>
            <td>
                ${stBadge}
                ${rescueBtn}
                
                ${errorHtml}
            </td>
            <td>
                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${o.progress}%"></div></div>
                <div style="font-size:10px; color:var(--muted); margin-top:4px; text-align:center">${o.progress}%</div>
            </td>
            <td>${dlLink}</td>
        </tr>`;
    }).join('');

    document.getElementById('main-content').innerHTML = `
        <div class="section-title" style="margin-bottom:16px;">
            <span>📋</span> Все заказы <span style="color:var(--muted); font-size:13px; font-weight:400;">(${orders.length})</span>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Пользователь</th>
                        <th>Тема</th>
                        <th>Тип</th>
                        <th>Стоимость</th>
                        <th>Статус</th>
                        <th>Прогресс</th>
                        <th>Файл</th>
                    </tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="8" style="text-align:center; color:var(--muted); padding:32px;">Заказов пока нет</td></tr>'}</tbody>
            </table>
        </div>`;
}

checkAdmin();
</script>
</body>
</html>
