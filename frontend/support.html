<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Техподдержка | Calamo</title>
    <meta name="description" content="Нужна помощь с Calamo? Свяжитесь с нашей техподдержкой. Мы ответим на любые вопросы по генерации работ, оплате и оформлению по ГОСТу.">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://calamo.lol/support.html">
    <meta property="og:title" content="Техподдержка Calamo — Мы всегда на связи">
    <meta property="og:description" content="Оставьте заявку, и наши специалисты помогут вам разобраться с любым вопросом.">
    <meta property="og:image" content="https://calamo.lol/assets/og-support.png">
    <link rel="canonical" href="https://calamo.lol/support.html">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9VV7FG6P8P"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-9VV7FG6P8P');</script>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        .success-msg {
            display: none;
            text-align: center;
            color: var(--success);
            font-weight: 500;
            padding: 15px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 8px;
        }

        .error-msg {
            display: none;
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="form-card">
        <h1>Связаться с нами</h1>
        <p class="subtitle">Опишите вашу проблему, и мы ответим вам в ближайшее время.</p>
        
        <form id="support-form" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="email">Email для обратной связи</label>
                <input type="email" id="email" placeholder="name@example.com" required>
                <div id="email-error" class="error-msg">Введите корректный email</div>
            </div>

            <div class="form-group">
                <label for="message">Текст обращения</label>
                <textarea id="message" rows="5" placeholder="Опишите ваш вопрос..." required></textarea>
            </div>

            <div class="form-group">
                <label for="files">Прикрепить файлы (необязательно)</label>
                <input type="file" id="files" multiple style="padding: 8px; border: 1px dashed var(--border); background: #fafafa;">
                <p style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">Можно выбрать несколько файлов</p>
            </div>

            <button type="submit" id="submit-btn">Отправить заявку</button>
        </form>

        <div id="success-box" class="success-msg">
            Ваша заявка принята!
        </div>
    </div>
</div>

<script>
    async function handleSubmit(event) {
        event.preventDefault();
        
        const email = document.getElementById('email').value;
        const message = document.getElementById('message').value;
        const fileInput = document.getElementById('files');
        const btn = document.getElementById('submit-btn');
        const successBox = document.getElementById('success-box');
        const form = document.getElementById('support-form');
        const emailError = document.getElementById('email-error');

        // Базовая валидация на фронте
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            emailError.style.display = 'block';
            return;
        }
        emailError.style.display = 'none';

        btn.disabled = true;
        btn.innerText = 'Отправка...';

        const formData = new FormData();
        formData.append('user_email', email);
        formData.append('message', message);
        if (fileInput.files.length > 0) {
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('files', fileInput.files[i]);
            }
        }

        try {
            const response = await fetch('/api/support/tickets', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                form.style.display = 'none';
                successBox.style.display = 'block';
            } else {
                const data = await response.json();
                alert('Ошибка: ' + (data.detail || 'Не удалось отправить заявку'));
            }
        } catch (error) {
            alert('Сетевая ошибка. Попробуйте позже.');
        } finally {
            btn.disabled = false;
            btn.innerText = 'Отправить заявку';
        }
    }
</script>

</body>
</html>
